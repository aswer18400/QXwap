name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync root index.html
        run: |
          cp artifacts/web-app/index.html index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || (git commit -m "chore: sync root index.html [skip ci]" && git push)

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        run: |
          mkdir -p _site
          cp artifacts/web-app/index.html _site/index.html
          [ -f artifacts/web-app/public/favicon.svg ] && cp artifacts/web-app/public/favicon.svg _site/favicon.svg || true
          [ -f artifacts/web-app/public/opengraph.jpg ] && cp artifacts/web-app/public/opengraph.jpg _site/opengraph.jpg || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
