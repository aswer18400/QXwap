name: CI and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: Type check, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        env:
          VITE_API_BASE: ${{ secrets.API_BASE_URL || 'https://qxwap-api.onrender.com/api' }}
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify backend health (pglite, no external DB needed)
        run: |
          node dist/boot.js &
          SERVER_PID=$!
          sleep 5
          curl -f http://localhost:3000/api/health || (kill $SERVER_PID; exit 1)
          kill $SERVER_PID

  deploy-frontend:
    name: Deploy frontend to GitHub Pages
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_BASE: ${{ secrets.API_BASE_URL || 'https://qxwap-api.onrender.com/api' }}
        run: npm run build

      - name: Inject API base URL into index.html
        run: |
          API_BASE="${{ secrets.API_BASE_URL || 'https://qxwap-api.onrender.com/api' }}"
          bash scripts/inject-api-base.sh "$API_BASE" dist/public/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/public
          cname: ''

  # Trigger Render backend deploy on main push
  # Uncomment after adding RENDER_DEPLOY_HOOK_URL to repository secrets
