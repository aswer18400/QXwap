<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QXwap Status</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #111827;
      }
      main {
        width: min(92vw, 520px);
        padding: 28px;
        border: 1px solid #e5e7eb;
        border-radius: 18px;
        background: #ffffff;
        box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      }
      .ok {
        color: #047857;
        font-weight: 700;
      }
      code {
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>QXwap Status</h1>
      <p class="ok">Static web status: OK</p>
      <p>Deployed frontend assets are reachable.</p>
      <p>Client time: <code id="time"></code></p>
    </main>
    <script>
      document.getElementById("time").textContent = new Date().toISOString();
    </script>
  </body>
</html>
