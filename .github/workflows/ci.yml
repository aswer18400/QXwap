name: CI

on:
  push:
    branches: [main, "claude/**", "feature/**"]
  pull_request:
    branches: [main]

jobs:
  build-and-typecheck:
    name: Build & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build lib/db
        run: pnpm --filter @workspace/db exec tsc -p tsconfig.json

      - name: Build lib/api-zod
        run: pnpm --filter @workspace/api-zod exec tsc -p tsconfig.json

      - name: Typecheck api-server
        run: pnpm --filter @workspace/api-server exec tsc -p tsconfig.json --noEmit

      - name: Run unit tests
        run: pnpm --filter @workspace/api-server test

      - name: Build api-server
        run: node ./artifacts/api-server/build.mjs

      - name: Check build output
        run: test -f artifacts/api-server/dist/index.mjs && echo "Build OK"
