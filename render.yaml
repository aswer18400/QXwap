# Render Blueprint for QXwap
# 
# HOW TO USE:
# 1. Push this repo to GitHub
# 2. Go to https://dashboard.render.com/blueprints
# 3. Click "New Blueprint Instance"
# 4. Select your GitHub repo
# 5. Render creates everything automatically

services:
  # Backend API Server
  - type: web
    name: qxwap-backend
    runtime: docker
    plan: starter
    region: singapore
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: qxwap-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://aswer18400.github.io
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1

  # Frontend Static Site
  - type: web
    name: qxwap-frontend
    runtime: static
    plan: starter
    region: singapore
    buildCommand: |
      npm ci && npm run build && \
      sed -i "s|__API_BASE__|https://qxwap-backend.onrender.com/api|g" dist/public/index.html
    staticPublishPath: ./dist/public

databases:
  - name: qxwap-db
    plan: starter
    region: singapore
    databaseName: qxwap
    user: qxwap
