<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QXwap MVP</title>
  <style>
    :root{
      --bg:#f5f3ef;
      --card:#ffffff;
      --text:#181818;
      --muted:#707070;
      --line:#e9e4dc;
      --primary:#3f6df6;
      --primary-2:#dfe7ff;
      --chip:#f9f7f3;
      --success:#dff0e7;
      --danger:#ffe2e2;
      --shadow:0 8px 24px rgba(0,0,0,.06);
      --radius:24px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    .app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:92px}
    .page{display:none;padding:20px 16px 120px}
    .page.active{display:block}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
    .title{font-size:28px;font-weight:800;letter-spacing:-.03em;margin:0}
    .icon-btn{border:none;background:#fff;box-shadow:var(--shadow);width:56px;height:56px;border-radius:18px;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .search-row{display:flex;align-items:center;gap:10px;margin:14px 0 14px}
    .search{flex:1;display:flex;align-items:center;background:#fff;border:1px solid var(--line);border-radius:20px;padding:0 16px;height:54px;box-shadow:var(--shadow)}
    .search input{border:none;outline:none;background:transparent;width:100%;font-size:18px}
    .chips{display:flex;gap:10px;overflow:auto;padding-bottom:4px;margin:0 0 18px}
    .chip{border:none;background:#fff;border:1px solid var(--line);border-radius:999px;padding:12px 18px;white-space:nowrap;font-weight:700;color:#444;cursor:pointer}
    .chip.active{background:#151515;color:#fff;border-color:#151515}
    .section-label{font-size:18px;font-weight:800;margin:18px 0 12px}
    .category-row{display:flex;gap:12px;overflow:auto;padding-bottom:4px;margin-bottom:16px}
    .category-card{min-width:132px;background:#fff;border:1px solid var(--line);border-radius:24px;padding:16px 14px;text-align:center;box-shadow:var(--shadow);cursor:pointer}
    .category-card.active{outline:2px solid #ccd8ff;background:#f8faff}
    .category-icon{width:52px;height:52px;border-radius:18px;background:#f4efe8;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:26px}
    .category-name{font-size:15px;font-weight:800}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .product-card{background:#fff;border:1px solid var(--line);border-radius:28px;padding:14px;box-shadow:var(--shadow)}
    .image-box{position:relative;border-radius:22px;background:linear-gradient(135deg,#dcdcdc,#f7f7f7);aspect-ratio:1/1;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:44px;color:#999}
    .badge{position:absolute;top:10px;left:10px;background:#fff;border-radius:12px;padding:6px 10px;font-size:12px;font-weight:800}
    .badge.right{left:auto;right:10px;background:rgba(24,24,24,.78);color:#fff}
    .product-title{font-size:18px;font-weight:800;line-height:1.15;margin:12px 0 8px}
    .product-meta{font-size:14px;color:var(--muted);margin-bottom:14px}
    .price{font-size:18px;font-weight:900;color:var(--primary);margin:6px 0}
    .btn-row{display:flex;gap:10px}
    .btn{border:none;border-radius:18px;padding:14px 16px;font-weight:800;font-size:16px;cursor:pointer}
    .btn.primary{background:linear-gradient(180deg,#5881ff,#3262f0);color:#fff;flex:1}
    .btn.soft{background:var(--success);color:#2a7250;flex:1}
    .btn.ghost{background:#fff;border:1px solid var(--line)}
    body.modal-open{overflow:hidden}
    #page-feed{padding-top:16px}
    .feed-top-sticky{
      position:sticky;
      top:0;
      z-index:30;
      background:linear-gradient(180deg,rgba(245,243,239,.98) 78%,rgba(245,243,239,0));
      backdrop-filter:blur(6px);
      margin:0 -16px 12px;
      padding:0 16px 8px;
    }
    #page-feed .search-row{margin:10px 0 12px}
    #page-feed .chips{margin:0 0 12px}
    .feed-category-row{display:flex;gap:10px;overflow:auto;padding:0 0 8px}
    .feed-category-chip{
      border:1px solid var(--line);
      background:#fff;
      border-radius:999px;
      min-height:40px;
      padding:8px 14px;
      font-size:13px;
      font-weight:800;
      color:#4d4740;
      display:inline-flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
      cursor:pointer;
      box-shadow:0 6px 14px rgba(0,0,0,.04);
    }
    .feed-category-chip.active{
      background:#eff3ff;
      border-color:#c9d6ff;
      color:#1f3ea5;
    }
    .feed-category-icon{font-size:16px;line-height:1}
    .feed-list{display:flex;flex-direction:column;gap:16px}
    .feed-card{
      position:relative;
      background:#fff;
      border-radius:32px;
      padding:12px 12px 16px;
      box-shadow:0 16px 30px rgba(24,22,17,.08);
      border:1px solid #ebe5db;
      overflow:hidden;
      transition:transform .22s ease,box-shadow .22s ease,border-color .2s ease;
    }
    .feed-card.saved{border-color:#ffd082}
    .feed-card.save-bump{transform:translateY(-2px)}
    .feed-card.xwap-active{box-shadow:0 20px 34px rgba(63,109,246,.2)}
    .feed-card.swiped-left,.feed-card.swiped-right{transform:scale(.985)}
    .feed-card.swiped-left{box-shadow:0 12px 30px rgba(243,107,74,.2)}
    .feed-card.swiped-right{box-shadow:0 12px 30px rgba(57,132,229,.2)}
    .feed-save-btn{
      position:absolute;
      top:16px;
      right:16px;
      z-index:4;
      border:none;
      width:40px;
      height:40px;
      border-radius:50%;
      background:rgba(255,255,255,.92);
      box-shadow:0 10px 18px rgba(0,0,0,.12);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      color:#484038;
      cursor:pointer;
      transition:transform .18s ease,background .18s ease,color .18s ease;
    }
    .feed-save-btn.saved{background:#151515;color:#ffd46f}
    .feed-save-btn:active{transform:scale(.94)}
    .swap-hero{
      position:relative;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      min-height:222px;
      margin-bottom:14px;
    }
    .swap-half{
      position:relative;
      border-radius:24px;
      overflow:hidden;
      background:#f6f3ee;
      border:1px solid #ece6db;
      min-height:222px;
      padding:10px;
    }
    .swap-half.want{background:#f9f8f4}
    .swap-label{
      position:absolute;
      top:10px;
      left:10px;
      z-index:2;
      background:rgba(255,255,255,.95);
      border-radius:999px;
      padding:5px 10px;
      font-size:12px;
      font-weight:900;
    }
    .swap-label.right{left:auto;right:10px;background:rgba(21,21,21,.9);color:#fff}
    .swap-media{
      margin-top:28px;
      height:calc(100% - 28px);
      border-radius:16px;
      overflow:hidden;
      background:linear-gradient(135deg,#e5e0d8,#f7f6f2);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }
    .swap-media img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#f1eee8;
    }
    .swap-media-fallback{
      font-size:60px;
      line-height:1;
      color:#888276;
      user-select:none;
    }
    .swap-media-wanted{
      font-size:14px;
      font-weight:800;
      line-height:1.45;
      color:#3b352e;
      padding:12px;
    }
    .feed-xwap-cta{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      z-index:5;
      border:none;
      min-width:94px;
      height:44px;
      padding:0 20px;
      border-radius:999px;
      background:linear-gradient(180deg,#5881ff,#3262f0);
      color:#fff;
      font-size:15px;
      font-weight:900;
      box-shadow:0 14px 22px rgba(50,98,240,.35);
      cursor:pointer;
    }
    .feed-xwap-cta:active{transform:translate(-50%,-50%) scale(.96)}
    .feed-card-body{padding:0 4px}
    .swap-card-title{font-size:20px;font-weight:900;letter-spacing:-.02em;margin:2px 0 4px;line-height:1.2}
    .swap-card-sub{font-size:13px;color:var(--muted)}
    .feed-meta-row{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:10px;
      margin-top:10px;
    }
    .feed-price{font-size:19px;font-weight:900;color:var(--primary)}
    .feed-request-summary{
      font-size:12px;
      color:#756f66;
      text-align:right;
      max-width:56%;
      line-height:1.3;
    }
    .feed-request-preview{
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:10px;
      padding:9px 10px;
      border-radius:14px;
      background:#f8f5ef;
      border:1px solid #efe7db;
    }
    .feed-request-avatars{display:flex;align-items:center}
    .feed-request-avatar{
      width:24px;
      height:24px;
      border-radius:50%;
      margin-left:-6px;
      border:2px solid #fff;
      background:#d4ccbf;
      color:#312c25;
      font-size:11px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    .feed-request-avatar:first-child{margin-left:0}
    .feed-request-avatar.fallback{background:#e7dfd2}
    .feed-request-avatar img{width:100%;height:100%;object-fit:cover;display:block}
    .feed-request-text{font-size:12px;color:#635b52;font-weight:700;line-height:1.3}
    .feed-actions{display:flex;gap:10px;margin-top:12px}
    .feed-actions .btn{flex:1}
    .skeleton-card{pointer-events:none}
    .skeleton-block,.skeleton-line{
      position:relative;
      overflow:hidden;
      background:#efebe4;
    }
    .skeleton-block::after,.skeleton-line::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent);
      animation:skeleton-wave 1.2s infinite;
      transform:translateX(-100%);
    }
    .skeleton-block{border-radius:14px;min-height:160px}
    .skeleton-line{height:14px;border-radius:10px;margin:10px 0}
    .skeleton-line.w-70{width:70%}
    .skeleton-line.w-55{width:55%}
    .skeleton-line.w-85{width:85%}
    @keyframes skeleton-wave{100%{transform:translateX(100%)}}
    .feed-empty-state,.feed-fallback-state{margin-bottom:12px}
    .feed-empty-title{font-size:16px;font-weight:900}
    .feed-empty-sub{font-size:13px;color:#786f65;margin-top:4px}
    .feed-detail-modal{
      position:fixed;
      inset:0;
      z-index:80;
      display:none;
    }
    .feed-detail-modal.open{display:block}
    .feed-detail-backdrop{
      position:absolute;
      inset:0;
      background:rgba(20,17,14,.48);
      backdrop-filter:blur(2px);
    }
    .feed-detail-sheet{
      position:absolute;
      left:50%;
      bottom:0;
      transform:translateX(-50%);
      width:min(520px,100%);
      border-radius:28px 28px 0 0;
      background:#fff;
      padding:18px 16px 20px;
      box-shadow:0 -10px 28px rgba(0,0,0,.18);
    }
    .feed-detail-close{
      border:none;
      background:#f4efe6;
      width:34px;
      height:34px;
      border-radius:50%;
      font-size:22px;
      line-height:1;
      margin-left:auto;
      display:block;
      cursor:pointer;
    }
    .feed-detail-emoji{
      width:84px;
      height:84px;
      border-radius:24px;
      background:#f8f4eb;
      border:1px solid #eee4d8;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:44px;
      margin:4px auto 10px;
    }
    .feed-detail-content h3{
      font-size:21px;
      margin:0;
      text-align:center;
      font-weight:900;
      line-height:1.2;
    }
    .feed-detail-meta{
      margin:8px 0 0;
      text-align:center;
      font-size:13px;
      color:#736b62;
    }
    .feed-detail-price{
      margin-top:14px;
      font-size:24px;
      font-weight:900;
      color:#2953da;
      text-align:center;
    }
    .feed-detail-wanted{
      margin-top:10px;
      padding:12px;
      border-radius:14px;
      background:#f8f5ef;
      border:1px solid #ece2d6;
      font-size:14px;
      line-height:1.45;
    }
    .feed-detail-actions{margin-top:14px}
    .auth-card,.panel,.list-card{background:#fff;border:1px solid var(--line);border-radius:28px;padding:16px;box-shadow:var(--shadow)}
    label{display:block;font-size:13px;font-weight:800;margin:12px 0 6px;color:#444}
    input,textarea,select{width:100%;border:1px solid var(--line);border-radius:18px;padding:14px 16px;font-size:16px;background:#fff;outline:none}
    textarea{min-height:110px;resize:vertical}
    .muted{color:var(--muted)}
    .mini{font-size:13px}
    .bottom-nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(520px,100%);background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:grid;grid-template-columns:1fr 1fr 84px 1fr 1fr;align-items:end;padding:10px 8px 8px;z-index:50}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;color:#7b746a;font-size:12px;font-weight:700;cursor:pointer}
    .nav-item.active{color:#233ea6}
    .nav-center{width:62px;height:62px;border-radius:20px;background:linear-gradient(180deg,#5881ff,#3262f0);display:flex;align-items:center;justify-content:center;color:#fff;font-size:34px;box-shadow:0 16px 28px rgba(63,109,246,.35);margin:0 auto 2px;cursor:pointer}
    .row{display:flex;gap:12px;align-items:center}
    .space{height:8px}
    .hidden{display:none!important}
    .notice{padding:12px 14px;border-radius:16px;margin-bottom:12px;font-size:14px}
    .notice.ok{background:#ebf8ef;color:#246847}
    .notice.error{background:#fff0f0;color:#9f2d2d}
    .offer-card{border:1px solid var(--line);border-radius:22px;padding:14px;background:#fff}
    .offer-status{display:inline-flex;padding:6px 10px;border-radius:999px;background:#edf2ff;color:#3559d1;font-size:12px;font-weight:900;margin-bottom:8px}
    .empty{padding:22px;border:1px dashed #d7d1c7;border-radius:24px;text-align:center;color:#7d786f;background:#faf8f4}
    .toolbar-note{font-size:12px;color:#7d786f;margin-top:10px}
  </style>
</head>
<body>
<div class="app">
  <section id="page-auth" class="page active">
    <div class="topbar"><h1 class="title">QXwap</h1><button class="icon-btn" onclick="loadSession()">↻</button></div>
    <div id="authNotice"></div>
    <div class="auth-card">
      <div class="section-label" style="margin-top:0">เข้าสู่ระบบ / สมัครสมาชิก</div>
      <label>อีเมล</label>
      <input id="authEmail" type="email" placeholder="name@example.com" />
      <label>รหัสผ่าน</label>
      <input id="authPassword" type="password" placeholder="อย่างน้อย 6 ตัว" />
      <div class="btn-row" style="margin-top:14px">
        <button id="signInBtn" class="btn primary" onclick="signIn()">เข้าใช้</button>
        <button id="signUpBtn" class="btn ghost" onclick="signUp()">สมัคร</button>
      </div>
      <div class="btn-row" style="margin-top:10px">
        <button class="btn ghost" style="flex:1" onclick="signInWithReplit()">เข้าใช้ด้วย Replit</button>
      </div>
      <div class="toolbar-note">เลือกใช้อีเมล/รหัสผ่าน หรือเข้าใช้ด้วยบัญชี Replit ก็ได้</div>
    </div>
  </section>

  <section id="page-feed" class="page">
    <div class="topbar">
      <h1 class="title">QXwap</h1>
      <div class="row">
        <button class="icon-btn" onclick="showPage('page-shop')">🛍️</button>
        <button class="icon-btn" onclick="showPage('page-profile')">👤</button>
      </div>
    </div>
    <div class="feed-top-sticky">
      <div class="search-row">
        <div class="search"><span style="font-size:24px;margin-right:10px">🔎</span><input id="feedSearch" placeholder="ค้นหาในฟีด" oninput="loadFeed()"></div>
        <button class="icon-btn" onclick="loadFeed()">⟳</button>
      </div>
      <div class="chips">
        <button class="chip active" data-feed-filter="all" onclick="setFeedFilter('all', this)">ทั้งหมด</button>
        <button class="chip" data-feed-filter="swap" onclick="setFeedFilter('swap', this)">Xwap ได้</button>
        <button class="chip" data-feed-filter="both" onclick="setFeedFilter('both', this)">ทั้งขายทั้งแลก</button>
      </div>
      <div id="feedCategoryRow" class="feed-category-row"></div>
    </div>
    <div id="feedNotice"></div>
    <div id="feedList" class="feed-list"></div>
  </section>

  <section id="page-shop" class="page">
    <div class="topbar">
      <h1 class="title">สินค้าทั้งหมด</h1>
      <button class="icon-btn" onclick="loadShop()">🔖</button>
    </div>
    <div class="search-row">
      <div class="search"><span style="font-size:24px;margin-right:10px">🔎</span><input id="shopSearch" placeholder="ค้นหาสินค้า" oninput="loadShop()"></div>
      <button class="icon-btn" onclick="loadShop()">☰</button>
    </div>
    <div class="chips">
      <button class="chip active" data-shop-filter="all" onclick="setShopFilter('all', this)">ทั้งหมด</button>
      <button class="chip" data-shop-filter="buy" onclick="setShopFilter('buy', this)">ซื้อได้เลย</button>
      <button class="chip" data-shop-filter="swap" onclick="setShopFilter('swap', this)">Xwap ได้</button>
    </div>
    <div class="section-label">หมวดหมู่</div>
    <div class="category-row" id="categoryRow"></div>
    <div id="shopNotice"></div>
    <div id="shopGrid" class="grid"></div>
  </section>

  <section id="page-add" class="page">
    <div class="topbar"><h1 class="title">เพิ่มสินค้า</h1><button class="icon-btn" onclick="resetListingForm()">⟲</button></div>
    <div id="addNotice"></div>
    <div class="panel">
      <label>ชื่อสินค้า</label><input id="itemTitle" placeholder="เช่น iPhone 14 128GB" />
      <label>รายละเอียด</label><textarea id="itemDescription" placeholder="สภาพ / อุปกรณ์ / ตำหนิ"></textarea>
      <label>หมวดหมู่</label>
      <select id="itemCategory">
        <option value="electronics">Electronics</option>
        <option value="baby">แม่และเด็ก</option>
        <option value="gadget">Gadget</option>
        <option value="phone">มือถือ</option>
        <option value="fashion">แฟชั่น</option>
        <option value="home">ของใช้ในบ้าน</option>
      </select>
      <label>ประเภทดีล</label>
      <select id="itemDealType">
        <option value="swap">แลกอย่างเดียว</option>
        <option value="buy">ขายอย่างเดียว</option>
        <option value="both">ขายหรือแลก</option>
      </select>
      <label>สิ่งที่อยากได้</label><textarea id="itemWanted" placeholder="เช่น อยากแลก iPad mini หรือของมูลค่าใกล้เคียง"></textarea>
      <label>ราคาขาย (ถ้ามี)</label><input id="itemPriceCash" type="number" min="0" placeholder="9990" />
      <label>เครดิต (ถ้ามี)</label><input id="itemPriceCredit" type="number" min="0" placeholder="500" />
      <label>เมือง / พื้นที่</label><input id="itemLocation" placeholder="Bangkok" value="Bangkok" />
      <label>อีโมจิแทนรูป (ชั่วคราว)</label><input id="itemEmoji" placeholder="📱" value="📦" />
      <div class="btn-row" style="margin-top:14px">
        <button class="btn primary" onclick="createItem()">บันทึกสินค้า</button>
      </div>
      <div class="toolbar-note">เวอร์ชันนี้ทำการเพิ่มสินค้า + ดึงขึ้น Shop/Feed/Profile ได้จริงจากฐานข้อมูล</div>
    </div>
  </section>

  <section id="page-inbox" class="page">
    <div class="topbar"><h1 class="title">Inbox</h1><button class="icon-btn" onclick="loadInbox()">⟳</button></div>
    <div id="inboxNotice"></div>
    <div class="search-row">
      <div class="search"><span style="font-size:24px;margin-right:10px">🔎</span><input id="inboxSearch" placeholder="ค้นหาดีลหรือสินค้า" oninput="loadInbox()"></div>
    </div>
    <div class="chips">
      <button class="chip active" onclick="setInboxFilter('action', this)">ดีลที่ต้องตอบ</button>
      <button class="chip" onclick="setInboxFilter('mine', this)">ดีลของฉัน</button>
      <button class="chip" onclick="setInboxFilter('closed', this)">ปิดแล้ว</button>
    </div>
    <div id="inboxList"></div>
  </section>
