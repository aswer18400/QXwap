name: CI and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: Type check, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        env:
          VITE_API_BASE: ${{ secrets.API_BASE_URL || 'https://qxwap-api.onrender.com/api' }}
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify backend health (pglite, no external DB needed)
        env:
          NODE_ENV: production
          DATABASE_URL: ./data/ci-db
          SESSION_SECRET: ci-health-check-secret-32chars-ok
          PORT: 3000
        run: |
          mkdir -p ./data/ci-db
          node dist/boot.js &
          SERVER_PID=$!
          sleep 8
          curl -f http://localhost:3000/api/health \
            && kill $SERVER_PID \
            || (kill $SERVER_PID 2>/dev/null; exit 1)

  deploy-frontend:
    name: Deploy frontend to GitHub Pages
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build frontend for GitHub Pages
        env:
          VITE_API_BASE: ${{ secrets.API_BASE_URL || 'https://qxwap-api.onrender.com/api' }}
        run: |
          npx vite build --base=/QXwap/
          node build-server.mjs
          node - <<'NODE'
          const fs = require('node:fs');
          const file = 'dist/public/index.html';
          const apiBase = process.env.VITE_API_BASE || 'https://qxwap-api.onrender.com/api';
          const html = fs.readFileSync(file, 'utf8').replaceAll('__API_BASE__', apiBase);
          fs.writeFileSync(file, html);
          NODE
          touch dist/public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

