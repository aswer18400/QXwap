version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    groups:
      type-deps:
        patterns:
          - "@types/*"
      dev-deps:
        dependency-type: development
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - ci
