# Render Blueprint for QXwap
# Service name must match the existing Render service: qxwap-api

services:
  - type: web
    name: qxwap-api
    runtime: node
    plan: free
    region: singapore
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: node dist/boot.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: qxwap-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://aswer18400.github.io
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1

databases:
  - name: qxwap-db
    plan: free
    region: singapore
    databaseName: qxwap
    user: qxwap
